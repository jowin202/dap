services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: dap
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dap"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://dap:${POSTGRES_PASSWORD}@db/dap
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-8}
      REFRESH_EXPIRE_DAYS: ${REFRESH_EXPIRE_DAYS:-30}
      FILES_DIR: /data/files
    volumes:
      - file-storage:/data/files
    command: >
      sh -c "
        cd /app &&
        alembic upgrade head &&
        uvicorn main:app --host 0.0.0.0 --port 8000
      "

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PORT:-8443}:443"

volumes:
  postgres-data:
  file-storage:
