# HTTP → HTTPS redirect
server {
    listen 80;
    return 301 https://$host$request_uri;
}

# HTTPS + HTTP/2
server {
    listen 443 ssl;
    http2 on;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # API, Auth, Script-Delivery → Backend
    # /api/upload, /api/info/*, /auth/*, /psdec/*, /shdec/*
    location ~ ^/(auth|api|psdec|shdec)/ {
        proxy_pass              http://backend:8000;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_set_header        X-Forwarded-Host  $host;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        client_max_body_size    0;
        proxy_request_buffering off;
        proxy_buffering         off;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
    }

    # /download/{token}: Browser-Navigation → Angular SPA, JS-Fetch → Backend
    # Sec-Fetch-Dest: document = normaler Seitenaufruf/Refresh → index.html
    # Sec-Fetch-Dest: empty    = fetch() aus Angular → Backend streamt die Datei
    location ~ ^/download/.+ {
        if ($http_sec_fetch_dest = "document") {
            rewrite ^ /index.html last;
        }
        proxy_pass              http://backend:8000;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_set_header        X-Forwarded-Host  $host;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_buffering         off;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
    }

    # Angular SPA fallback (inkl. /upload, /download, /login ohne Token)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
