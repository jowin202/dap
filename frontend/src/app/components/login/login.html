<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="logo-row">
        <mat-icon class="logo-icon">lock</mat-icon>
        <span class="app-title">SecureTransfer</span>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="onSubmit()" #f="ngForm">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Benutzername</mat-label>
          <input matInput [(ngModel)]="username" name="username" autocomplete="username" required />
          <mat-icon matPrefix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Passwort</mat-label>
          <input matInput [(ngModel)]="password" name="password"
                 [type]="hidePass ? 'password' : 'text'"
                 autocomplete="current-password" required />
          <mat-icon matPrefix>key</mat-icon>
          <button type="button" mat-icon-button matSuffix (click)="hidePass = !hidePass">
            <mat-icon>{{ hidePass ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <mat-checkbox [(ngModel)]="rememberMe" name="rememberMe" class="remember-me">
          Angemeldet bleiben
        </mat-checkbox>

        <button mat-flat-button color="primary" type="submit"
                class="full-width login-btn" [disabled]="loading">
          @if (loading) {
            <mat-spinner diameter="20" />
          } @else {
            Anmelden
          }
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
