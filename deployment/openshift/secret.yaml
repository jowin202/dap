apiVersion: v1
kind: Secret
metadata:
  name: securetransfer-secrets
  namespace: securetransfer
type: Opaque
# Werte müssen base64-kodiert sein: echo -n 'mein-passwort' | base64
data:
  POSTGRES_PASSWORD: <base64-encoded-password>
  ADMIN_TOKEN: <base64-encoded-token>
  JWT_SECRET: <base64-encoded-secret>
